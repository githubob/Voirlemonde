  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .pwd-input {
    width: 100%; padding: 14px 18px; border-radius: 30px;
    border: 1px solid var(--border); background: #0d0f14; color: var(--text);
    font-size: 15px; margin-bottom: 12px; outline: none; text-align: center;
  }
  .pwd-input:focus { border-color: var(--gold); }
  .pwd-btn {
    width: 100%; padding: 14px; border-radius: 30px; border: none;
    background: var(--gold); color: #0d0f14; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .pwd-btn:hover { opacity: 0.85; }
  .login-error { font-size: 12px; color: #fca5a5; margin-top: 12px; display: none; }

  .app { display: none; }

  .hero {
    background: linear-gradient(160deg, #0d0f14 0%, #1a1428 50%, #0d1520 100%);

  .hero-sub { color: var(--muted); font-size: 15px; max-width: 500px; margin: 0 auto; }

  .stat-l { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-top: 4px; }

  .top-bar {

  }
}

function showApp() {

function logout() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function slugify(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const values = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    values.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (values[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  }).filter(r => r.pays && r.titre);
}

  const countries = {}; const order = [];
  rows.forEach(r => {
    if (!countries[r.pays]) { countries[r.pays] = []; order.push(r.pays); }
    countries[r.pays].push(r);
  });
  document.getElementById('stat-pays').textContent = order.length;
  document.getElementById('stat-events').textContent = rows.length;
  document.getElementById('sync-status').textContent = source;
  document.getElementById('last-updated').textContent = 'Mis à jour le ' + new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  order.forEach(pays => {
    const pill = document.createElement('a');
    pill.className = 'nav-pill'; pill.href = '#'+slugify(pays);
    pill.textContent = (countries[pays][0].drapeau||'') + ' ' + pays;
    nav.appendChild(pill);
  });
  order.forEach(pays => {
    const events = countries[pays];
    const code = (events[0].code_pays||'').toLowerCase();
    const accent = ACCENTS[code]||'#c9a84c';
    const sec = document.createElement('section');
    sec.className = 'country-section'; sec.id = slugify(pays);
    sec.innerHTML = `
      <div class="country-header">
        <span class="country-flag">${events[0].drapeau||''}</span>
        <span class="country-name">${pays}</span>
        <span class="country-count">${events.length} événement${events.length>1?'s':''}</span>
      </div>
      <div class="events-grid">${events.map(ev => {
        const s = (ev.saison||'').toLowerCase();
        const href = ev.lien?(ev.lien.startsWith('http')?ev.lien:'https://'+ev.lien):'#';
        return `<a class="event-card" href="${href}" target="_blank" style="--accent:${accent}">
          <div class="event-left">
            <div class="event-meta">
              <span class="event-city" style="color:${accent}">${ev.ville||''}</span>
              ${s?`<span class="event-dot"></span><span class="season-badge badge-${s}">${ev.saison}</span>`:''}
            </div>
            <div class="event-title">${ev.titre||''}</div>
            <div class="event-desc">${ev.description||''}</div>
          </div>
          <div class="event-right">
            <div class="event-date">${ev.dates||''}</div>
            <div class="event-link-icon">→</div>
          </div>
        </a>`;
      }).join('')}</div>`;
    main.appendChild(sec);
  });
}

async function loadFromSheet() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '↻ Sync en cours...';
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`)}`,
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text.includes('pays')) continue;
      const rows = parseCSV(text);
      if (rows.length > 0) { buildPage(rows, '✓ Google Sheet (live)'); break; }
    } catch(e) { continue; }
  }
  btn.disabled = false; btn.textContent = '↻ Sync Google Sheet';
}

// Init
if (localStorage.getItem(STORAGE_KEY) === '1') {
  showApp();
}
</script>
